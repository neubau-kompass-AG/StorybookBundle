name: CI

on:
  pull_request: ~
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */12 * * *"

jobs:
  composer-validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Validate composer.json
        run: composer validate --strict
  cs-php:
    name: Check coding standards
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: php-cs-fixer
      - name: Run PHP-CS-Fixer
        run: php-cs-fixer fix --dry-run --diff
  sca-php:
    name: PHPStan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Install composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Install PHPUnit
        run: vendor/bin/simple-phpunit --version
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse
  js:
    name: JavaScript (${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-manager: [npm, pnpm, yarn, bun]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Setup pnpm
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Setup Yarn
        if: matrix.package-manager == 'yarn'
        run: npm install --global yarn@1.22.22
      - name: Setup Bun
        if: matrix.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm ci ;;
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            bun) bun install --frozen-lockfile ;;
          esac
      - name: Build
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run build ;;
            pnpm) pnpm build ;;
            yarn) yarn build ;;
            bun) bun run build ;;
          esac
      - name: Test
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run test ;;
            pnpm) pnpm test ;;
            yarn) yarn test ;;
            bun) bun run test ;;
          esac
      - name: Lint
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run lint ;;
            pnpm) pnpm lint ;;
            yarn) yarn lint ;;
            bun) bun run lint ;;
          esac
      - name: Check formatting
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run format:check ;;
            pnpm) pnpm format:check ;;
            yarn) yarn format:check ;;
            bun) bun run format:check ;;
          esac
      - name: Check if JS dist files are current
        if: matrix.package-manager == 'npm'
        run: |
          STATUS="$(git status --porcelain)"
          if [ -n "$STATUS" ]; then
            echo "JS build or install changed tracked files:"
            echo "$STATUS"
            exit 1
          fi
  tests-php:
    name: PHPUnit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Install composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPUnit
        run: vendor/bin/simple-phpunit
  tests-integration:
    name: Storybook Vitest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Configure sandbox app
        run: ./sandbox/bin/setup-standalone
      - name: Install Playwright
        run: npx playwright install --with-deps
        working-directory: sandbox
      - name: Run Storybook test suite
        run: ./scripts/test-sandbox.sh
