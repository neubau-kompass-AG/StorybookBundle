name: CI

on:
  pull_request: ~
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */12 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  composer-validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Validate composer.json
        run: composer validate --strict
  cs-php:
    name: Check coding standards
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: php-cs-fixer
      - name: Run PHP-CS-Fixer
        run: php-cs-fixer fix --dry-run --diff
  sca-php:
    name: PHPStan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-phpstan-composer-php-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-phpstan-composer-php-${{ matrix.php }}-
            ${{ runner.os }}-composer-php-${{ matrix.php }}-
            ${{ runner.os }}-composer-
      - name: Install composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Install PHPUnit
        run: vendor/bin/simple-phpunit --version
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse
  js:
    name: JavaScript (${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-manager: [npm, pnpm, yarn, bun]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Setup pnpm
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Setup Yarn
        if: matrix.package-manager == 'yarn'
        run: npm install --global yarn@1.22.22
      - name: Setup Bun
        if: matrix.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Cache npm downloads
        if: matrix.package-manager == 'npm'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-npm-
      - name: Cache pnpm store
        if: matrix.package-manager == 'pnpm'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-node-24-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-24-pnpm-
      - name: Cache Yarn downloads
        if: matrix.package-manager == 'yarn'
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-node-24-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-24-yarn-
      - name: Cache Bun downloads
        if: matrix.package-manager == 'bun'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-node-24-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-24-bun-
      - name: Install dependencies
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm ci ;;
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            bun) bun install --frozen-lockfile ;;
          esac
      - name: Build
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run build ;;
            pnpm) pnpm build ;;
            yarn) yarn build ;;
            bun) bun run build ;;
          esac
      - name: Test
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run test ;;
            pnpm) pnpm test ;;
            yarn) yarn test ;;
            bun) bun run test ;;
          esac
      - name: Lint
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run lint ;;
            pnpm) pnpm lint ;;
            yarn) yarn lint ;;
            bun) bun run lint ;;
          esac
      - name: Check formatting
        run: |
          case "${{ matrix.package-manager }}" in
            npm) npm run format:check ;;
            pnpm) pnpm format:check ;;
            yarn) yarn format:check ;;
            bun) bun run format:check ;;
          esac
      - name: Check if JS dist files are current
        if: matrix.package-manager == 'npm'
        run: |
          STATUS="$(git status --porcelain -- package-lock.json packages/shared/dist packages/vite/dist packages/webpack/dist)"
          if [ -n "$STATUS" ]; then
            echo "npm install/build updated tracked JS artifacts; please commit the updated dist/lockfiles listed below:"
            echo "$STATUS"
            exit 1
          fi
  tests-php:
    name: PHPUnit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-phpunit-composer-php-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-phpunit-composer-php-${{ matrix.php }}-
            ${{ runner.os }}-composer-php-${{ matrix.php }}-
            ${{ runner.os }}-composer-
      - name: Install composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPUnit
        run: vendor/bin/simple-phpunit
  tests-integration:
    name: Storybook Vitest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    continue-on-error: ${{ matrix.php == '8.5' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-storybook-composer-php-${{ matrix.php }}-${{ hashFiles('sandbox/composer.json', 'sandbox/bin/setup-standalone') }}
          restore-keys: |
            ${{ runner.os }}-storybook-composer-php-${{ matrix.php }}-
            ${{ runner.os }}-composer-php-${{ matrix.php }}-
            ${{ runner.os }}-composer-
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache sandbox npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-php-${{ matrix.php }}-sandbox-npm-${{ hashFiles('sandbox/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-php-${{ matrix.php }}-sandbox-npm-
            ${{ runner.os }}-node-24-sandbox-npm-
      - name: Configure sandbox app
        run: ./sandbox/bin/setup-standalone
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-php-${{ matrix.php }}-playwright-${{ hashFiles('sandbox/package.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-playwright-
            ${{ runner.os }}-playwright-
      - name: Install Playwright
        run: npx playwright install --with-deps
        working-directory: sandbox
      - name: Run Storybook test suite
        run: ./scripts/test-sandbox.sh
